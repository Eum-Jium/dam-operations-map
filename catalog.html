function renderDamTable(dams){

function renderResvList(names){
  var cat={'댐·저수지':[],'조정지':[],'보(weir)':[],'하굿둑':[]};

}

window.renderKoreaMap=function(st,note){

window.renderDroughtChart=function(){
  var W=580,H=260,L=44,R=14,T=14,B=34,iw=W-L-R,ih=H-T-B;
  var n=DROUGHT.md.length;
  var ymin=150,ymax=315;
  function X(i){return L+iw*i/(n-1);}
  function Y(v){return T+ih*(1-(v-ymin)/(ymax-ymin));}
  function poly(arr,col,dash){var p=arr.map(function(v,i){return X(i).toFixed(1)+','+Y(v).toFixed(1);}).join(' ');return '<polyline points="'+p+'" fill="none" stroke="'+col+'" stroke-width="1.8"'+(dash?' stroke-dasharray="4 3"':'')+'/>';}
  var grid='',yt=[150,200,250,300];
  yt.forEach(function(v){var y=Y(v).toFixed(1);grid+='<line x1="'+L+'" y1="'+y+'" x2="'+(W-R)+'" y2="'+y+'" stroke="#eef2f7"/><text x="'+(L-6)+'" y="'+(+y+3)+'" text-anchor="end" font-size="10" fill="#94a3b8">'+v+'</text>';});
  var xl='';
  for(var i=0;i<n;i+=3){var x=X(i).toFixed(1);var mm=DROUGHT.md[i].slice(0,2);xl+='<text x="'+x+'" y="'+(H-12)+'" text-anchor="middle" font-size="9.5" fill="#94a3b8">'+mm+'</text>';}
  var lines=poly(DROUGHT.rec,'#16a34a',true)+poly(DROUGHT.att,'#2563eb')+poly(DROUGHT.cau,'#d97706')+poly(DROUGHT.ale,'#ea580c')+poly(DROUGHT.ser,'#dc2626');
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:580px;height:auto" role="img" aria-label="합천댐 가뭄단계 기준저수량 곡선"><rect x="'+L+'" y="'+T+'" width="'+iw+'" height="'+ih+'" fill="#fff" stroke="#e2e8f0"/>'+grid+xl+lines+'</svg>';
  var leg=[['관심','#2563eb'],['주의','#d97706'],['경계','#ea580c'],['심각','#dc2626'],['회복(점선)','#16a34a']].map(function(e){return '<span style="display:inline-flex;align-items:center;gap:5px;margin:0 12px 4px 0;font-size:12px"><span style="width:14px;height:3px;background:'+e[1]+';display:inline-block"></span>'+e[0]+'</span>';}).join('');
  return '<div class="card"><div style="text-align:center">'+svg+'</div><div style="margin-top:8px;border-top:1px solid #f1f5f9;padding-top:8px">'+leg+'</div><div style="font-size:11px;color:#94a3b8;margin-top:3px">단위 '+DROUGHT.unit+' · 순별(旬) 36점 · '+DROUGHT.note+' · 댐 인자로 전국 15개 다목적댐 조회</div></div>';
